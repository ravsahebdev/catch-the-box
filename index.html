<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Catch The Box</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game">

        <div class="top">
            <div class="card">
                <p>⏱️ Time</p>
                <h2 id="timeDisplay">0</h2>
            </div>
            <div class="card">
                <p>🏆 Score</p>
                <h2 id="scoreDisplay">0</h2>
            </div>
        </div>

        <div class="playground" id="playground">
            <div class="overlay" id="gameOverOverlay">
                Game Over
                <div><span id="gameScore"></span> Game Score 🏆</div>
                <div><span id="points"></span></div>
            </div>
        </div>

        <div class="buttons">
            <button id="startBtn">▶ Start</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
